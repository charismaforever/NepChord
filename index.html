<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NepChords Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #6a6a82;
    --nep: #c8f060;
    --rnb: #f06090;
    --game: #60c8f0;
    --ewf: #f0a060;
    --inner: #b07ff0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .logo .accent { color: var(--nep); }
  .logo .sub {
    display: block;
    font-size: 0.55rem;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.14em;
    margin-top: 5px;
  }

  .controls-bar {
    display: flex;
    gap: 14px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-label { font-size: 0.55rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }

  select, input[type=range] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 10px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  select:focus, select:hover { border-color: var(--nep); }
  input[type=range] { padding: 4px 0; width: 90px; accent-color: var(--nep); }

  .transpose-btns { display: flex; gap: 4px; }
  .trans-btn {
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .trans-btn:hover { border-color: var(--nep); color: var(--nep); }
  #octave-display { width: 40px; font-size: 0.6rem; cursor: default; color: var(--nep); }

  /* CATEGORY TABS */
  .cat-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .cat-tab {
    padding: 10px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .cat-tab:hover { color: var(--text); }
  .cat-tab.active { color: var(--text); font-weight: 700; }
  .cat-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
  }

  /* PACK NAV */
  .pack-nav {
    display: flex;
    gap: 6px;
    padding: 14px 0 16px;
    flex-wrap: wrap;
  }

  .pack-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 6px 13px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .pack-btn:hover { color: var(--text); }
  .pack-btn.active { font-weight: 700; color: #0a0a0f; }
  .pack-key { font-size: 0.55rem; opacity: 0.75; margin-left: 5px; }

  /* MIX BAR */
  .mix-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .mix-label { font-size: 0.58rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }

  .mix-toggle { display: flex; gap: 6px; flex-wrap: wrap; }

  .mix-chip {
    padding: 5px 11px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .mix-chip:hover { color: var(--text); }
  .mix-chip.on { color: #0a0a0f; font-weight: 700; border-color: transparent; }

  .btn-shuffle {
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .btn-shuffle:hover { border-color: var(--nep); color: var(--nep); }

  .mix-count { margin-left: auto; font-size: 0.58rem; color: var(--muted); white-space: nowrap; }
  .mix-count strong { color: var(--nep); }

  /* CHORD GRID */
  .section-label {
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .chord-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
    gap: 8px;
    margin-bottom: 24px;
  }

  .chord-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--card-color, #444);
    border-radius: 6px;
    padding: 11px 10px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    animation: fadeUp 0.2s ease both;
    position: relative;
    overflow: hidden;
  }
  .chord-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-color, #888);
    opacity: 0;
    transition: opacity 0.12s;
    pointer-events: none;
  }
  .chord-card:hover { transform: translateY(-2px); }
  .chord-card:hover::after { opacity: 0.07; }
  .chord-card.playing { box-shadow: 0 0 18px color-mix(in srgb, var(--card-color, #888) 40%, transparent); animation: pulse-ring 0.5s ease-out; }
  .chord-card.playing::after { opacity: 0.14; }

  .chord-num { font-size: 0.5rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 5px; position: relative; z-index: 1; }
  .chord-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; position: relative; z-index: 1; line-height: 1.1; }
  .chord-notes { font-size: 0.52rem; color: var(--muted); position: relative; z-index: 1; letter-spacing: 0.03em; line-height: 1.5; }
  .chord-pack-tag { font-size: 0.48rem; color: var(--muted); margin-top: 4px; position: relative; z-index: 1; opacity: 0.65; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--card-color,#888) 50%, transparent); }
    70%  { box-shadow: 0 0 0 10px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* VISUALIZER */
  canvas#visualizer {
    display: block;
    width: 100%;
    height: 54px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  /* SEQUENCER */
  .sequencer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .seq-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .bpm-display {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--nep);
    min-width: 36px;
    text-align: center;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--nep); color: var(--nep); }
  .btn.primary { background: var(--nep); border-color: var(--nep); color: #0a0a0f; font-weight: 700; }
  .btn.primary:hover { background: #d8ff70; }
  .btn.stop { background: var(--rnb); border-color: var(--rnb); color: #0a0a0f; font-weight: 700; }
  .btn.danger { border-color: #f06090; color: #f06090; }
  .btn.danger:hover { background: rgba(240,96,144,0.1); }

  .seq-slots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 66px;
    margin-bottom: 20px;
    align-items: center;
  }

  .seq-slot {
    width: 88px;
    height: 52px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--slot-color, #888);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: var(--muted);
    cursor: default;
    position: relative;
    flex-shrink: 0;
    padding: 5px 8px;
    transition: all 0.12s;
  }
  .seq-slot.seq-playing {
    border-color: var(--slot-color,#888) !important;
    box-shadow: 0 0 14px color-mix(in srgb, var(--slot-color,#888) 45%, transparent);
  }
  .seq-slot .remove-btn {
    position: absolute; top: 3px; right: 5px;
    font-size: 0.5rem; color: var(--muted); cursor: pointer;
  }
  .seq-slot .remove-btn:hover { color: var(--rnb); }
  .seq-slot-name { font-size: 0.62rem; font-weight: 700; font-family: 'Syne', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 66px; }
  .seq-slot-sub { font-size: 0.48rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 66px; }
  .seq-empty { color: var(--muted); font-size: 0.62rem; letter-spacing: 0.08em; }

  /* STATUS */
  .status-bar {
    display: flex;
    gap: 20px;
    padding: 9px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    flex-wrap: wrap;
  }
  .status-bar strong { color: var(--nep); }

  @media (max-width: 600px) {
    .logo { font-size: 1.5rem; }
    header { flex-direction: column; align-items: flex-start; }
    .cat-tab { padding: 8px 12px; font-size: 0.58rem; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      Nep<span class="accent">Chords</span>
      <span class="sub">MP FREE CHORD PRESETS // MULTI-PACK BROWSER PLAYER</span>
    </div>
    <div class="controls-bar">
      <div class="control-group">
        <span class="control-label">Waveform</span>
        <select id="waveform">
          <option value="sine">Sine</option>
          <option value="triangle" selected>Triangle</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="square">Square</option>
        </select>
      </div>
      <div class="control-group">
        <span class="control-label">Release</span>
        <input type="range" id="release" min="0.1" max="4" step="0.1" value="1.5">
      </div>
      <div class="control-group">
        <span class="control-label">Volume</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="0.6">
      </div>
      <div class="control-group">
        <span class="control-label">Octave</span>
        <div class="transpose-btns">
          <button class="trans-btn" onclick="transpose(-12)">−</button>
          <button class="trans-btn" id="octave-display">0</button>
          <button class="trans-btn" onclick="transpose(+12)">+</button>
        </div>
      </div>
    </div>
  </header>

  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="pack-nav" id="pack-nav"></div>

  <div class="mix-bar">
    <span class="mix-label">Mix Packs</span>
    <div class="mix-toggle" id="mix-toggle"></div>
    <button class="btn-shuffle" onclick="shuffleMix()">⇄ Shuffle Mix</button>
    <span class="mix-count">Showing <strong id="mix-count">0</strong> chords across <strong id="mix-pack-count">0</strong> packs</span>
  </div>

  <p class="section-label" id="pack-title">—</p>
  <div class="chord-grid" id="chord-grid"></div>

  <canvas id="visualizer"></canvas>

  <div class="sequencer-header">
    <p class="section-label">CHORD SEQUENCER</p>
    <div class="seq-controls">
      <div class="control-group" style="flex-direction:row;align-items:center;gap:8px">
        <span class="control-label">BPM</span>
        <input type="range" id="bpm-range" min="40" max="200" step="1" value="90" oninput="updateBpm(this.value)">
        <div class="bpm-display" id="bpm-display">90</div>
      </div>
      <button class="btn primary" id="seq-play-btn" onclick="toggleSequencer()">▶ PLAY</button>
      <button class="btn danger" onclick="clearSequencer()">CLEAR</button>
    </div>
  </div>
  <div class="seq-slots" id="seq-slots">
    <span class="seq-empty">← Click any chord card to add it to the sequence</span>
  </div>

  <div class="status-bar">
    <span>CHORD: <strong id="status-chord">—</strong></span>
    <span>PACK: <strong id="status-pack">—</strong></span>
    <span>NOTES: <strong id="status-notes">—</strong></span>
    <span>RELEASE: <strong id="status-release">1.5s</strong></span>
  </div>

</div>

// ─── HELPERS ───────────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiToName(m) { return NOTE_NAMES[m%12]+(Math.floor(m/12)-1); }

function chordLabel(notes) {
  if (!notes.length) return '?';
  const s=[...notes].sort((a,b)=>a-b), root=s[0];
  const iv=s.map(n=>(n-root)%12).filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a-b);
  const r=NOTE_NAMES[root%12], h=n=>iv.includes(n);
  if(h(3)&&h(6)&&h(10)) return r+'m7♭5';
  if(h(4)&&h(7)&&h(11)) return r+'maj7';
  if(h(3)&&h(7)&&h(10)) return r+'m7';
  if(h(4)&&h(7)&&h(10)) return r+'7';
  if(h(3)&&h(6)&&h(9))  return r+'dim7';
  if(h(4)&&h(8)&&h(11)) return r+'maj7#5';
  if(h(4)&&h(8))         return r+'aug';
  if(h(3)&&h(6))         return r+'dim';
  if(h(2)&&h(7))         return r+'sus2';
  if(h(5)&&h(7))         return r+'sus4';
  if(h(4)&&h(7))         return r+'';
  if(h(3)&&h(7))         return r+'m';
  if(h(5))               return r+'add4';
  if(h(9))               return r+'add6';
  return r+' chord';
}

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentCat  = 'NepChords';
let currentPack = 'AstralHaze';
let transposeOffset = 0;
let mixEnabled  = { 'NepChords':true, 'R&B 90s League':false, 'GameTheory':false, 'EWF Elements':false, 'InnerChords':false };

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx, analyser, masterGain, activeNodes=[];

function initAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser(); analyser.fftSize=512;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('volume').value);
  masterGain.connect(analyser); analyser.connect(audioCtx.destination);
  startVisualizer();
}

function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }

function playChord(notes,pack,idx,cat) {
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  activeNodes.forEach(n=>{try{n.stop();}catch(e){}});
  activeNodes=[];
  const wf=document.getElementById('waveform').value;
  const rel=parseFloat(document.getElementById('release').value);
  const now=audioCtx.currentTime;
  const cg=audioCtx.createGain();
  cg.gain.setValueAtTime(0.001,now);
  cg.gain.exponentialRampToValueAtTime(0.7,now+0.02);
  cg.gain.setValueAtTime(0.7,now+0.1);
  cg.gain.exponentialRampToValueAtTime(0.001,now+rel);
  cg.connect(masterGain);
  notes.forEach(m=>{
    const osc=audioCtx.createOscillator(),og=audioCtx.createGain();
    osc.type=wf; osc.frequency.setValueAtTime(midiToFreq(m+transposeOffset),now);
    og.gain.value=1/notes.length;
    osc.connect(og); og.connect(cg); osc.start(now); osc.stop(now+rel+0.1);
    activeNodes.push(osc);
  });
  const c=cat||currentCat, p=CATEGORIES[c].packs[pack];
  document.getElementById('status-chord').textContent=chordLabel(notes)+' (#'+(idx+1)+')';
  document.getElementById('status-pack').textContent=pack+' · '+p.key+' · '+c;
  document.getElementById('status-notes').textContent=notes.map(m=>midiToName(m+transposeOffset)).join(' · ');
  document.getElementById('status-release').textContent=rel.toFixed(1)+'s';
}

document.getElementById('volume').addEventListener('input',e=>{
  if(masterGain) masterGain.gain.value=parseFloat(e.target.value);
});
document.getElementById('release').addEventListener('input',e=>{
  document.getElementById('status-release').textContent=parseFloat(e.target.value).toFixed(1)+'s';
});

// ─── VISUALIZER ─────────────────────────────────────────────────────────────
function startVisualizer(){
  const canvas=document.getElementById('visualizer');
  const ctx=canvas.getContext('2d');
  function resize(){ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; }
  resize(); window.addEventListener('resize',resize);
  const bufLen=analyser.frequencyBinCount, data=new Uint8Array(bufLen);
  function draw(){
    requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(data);
    const w=canvas.width,h=canvas.height;
    ctx.fillStyle='#111118'; ctx.fillRect(0,0,w,h);
    const col=CATEGORIES[currentCat]?.color||'#c8f060';
    ctx.lineWidth=1.5; ctx.strokeStyle=col; ctx.shadowBlur=10; ctx.shadowColor=col;
    ctx.beginPath();
    const sw=w/bufLen; let x=0;
    for(let i=0;i<bufLen;i++){const v=data[i]/128,y=(v*h)/2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);x+=sw;}
    ctx.stroke(); ctx.shadowBlur=0;
  }
  draw();
}

// ─── TRANSPOSE ──────────────────────────────────────────────────────────────
function transpose(d){
  transposeOffset+=d;
  document.getElementById('octave-display').textContent=(transposeOffset>=0?'+':'')+transposeOffset;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderCatTabs(){
  const el=document.getElementById('cat-tabs'); el.innerHTML='';
  Object.keys(CATEGORIES).forEach(cat=>{
    const color=CATEGORIES[cat].color;
    const btn=document.createElement('button');
    btn.className='cat-tab'+(cat===currentCat?' active':'');
    btn.style.borderBottomColor=cat===currentCat?color:'transparent';
    btn.innerHTML=`<span class="cat-dot" style="background:${color}"></span>${cat}`;
    btn.onclick=()=>{ currentCat=cat; if(!CATEGORIES[cat].packs[currentPack]) currentPack=Object.keys(CATEGORIES[cat].packs)[0]; renderAll(); };
    el.appendChild(btn);
  });
}

function renderPackNav(){
  const el=document.getElementById('pack-nav'); el.innerHTML='';
  const cat=CATEGORIES[currentCat];
  Object.keys(cat.packs).forEach(pack=>{
    const btn=document.createElement('button');
    btn.className='pack-btn'+(pack===currentPack?' active':'');
    if(pack===currentPack){ btn.style.background=cat.color; btn.style.borderColor=cat.color; }
    btn.innerHTML=pack+'<span class="pack-key">'+cat.packs[pack].key+'</span>';
    btn.onclick=()=>{
      currentPack=pack;
      Object.keys(mixEnabled).forEach(k=>mixEnabled[k]=false);
      mixEnabled[currentCat]=true;
      renderAll();
    };
    el.appendChild(btn);
  });
}

function renderMixBar(){
  const el=document.getElementById('mix-toggle'); el.innerHTML='';
  Object.keys(CATEGORIES).forEach(cat=>{
    const color=CATEGORIES[cat].color;
    const chip=document.createElement('button');
    chip.className='mix-chip'+(mixEnabled[cat]?' on':'');
    chip.style.background=mixEnabled[cat]?color:'';
    chip.textContent=cat;
    chip.onclick=()=>{
      mixEnabled[cat]=!mixEnabled[cat];
      if(!Object.values(mixEnabled).some(v=>v)) mixEnabled[cat]=true;
      renderChordGrid(); renderMixBar();
    };
    el.appendChild(chip);
  });
}

function renderChordGrid(){
  const grid=document.getElementById('chord-grid'); grid.innerHTML='';
  const enabledCats=Object.keys(mixEnabled).filter(k=>mixEnabled[k]);
  const isSingle=enabledCats.length===1&&enabledCats[0]===currentCat;
  let items=[];

  if(isSingle){
    const pack=CATEGORIES[currentCat].packs[currentPack];
    pack.chords.forEach((ch,i)=>items.push({cat:currentCat,pack:currentPack,chord:ch,idx:i}));
    document.getElementById('pack-title').textContent=
      '— '+currentPack+' · '+pack.key+' · '+currentCat+' · '+pack.chords.length+' chords';
  } else {
    enabledCats.forEach(cat=>{
      Object.keys(CATEGORIES[cat].packs).forEach(pack=>{
        CATEGORIES[cat].packs[pack].chords.forEach((ch,i)=>items.push({cat,pack,chord:ch,idx:i}));
      });
    });
    items=items.sort(()=>Math.random()-0.5);
    document.getElementById('pack-title').textContent=
      '— Mix: '+enabledCats.join(' + ')+' · '+items.length+' chords shuffled';
  }

  const totalPacks=enabledCats.reduce((a,c)=>a+Object.keys(CATEGORIES[c].packs).length,0);
  document.getElementById('mix-count').textContent=items.length;
  document.getElementById('mix-pack-count').textContent=totalPacks;

  items.forEach((item,gi)=>{
    const color=CATEGORIES[item.cat].color;
    const label=chordLabel(item.chord);
    const card=document.createElement('div');
    card.className='chord-card';
    card.style.animationDelay=(gi*0.015)+'s';
    card.style.setProperty('--card-color',color);
    card.innerHTML=`
      <div class="chord-num">CHORD ${String(item.idx+1).padStart(2,'0')}</div>
      <div class="chord-name" style="color:${color}">${label}</div>
      <div class="chord-notes">${item.chord.map(m=>midiToName(m)).join(' ')}</div>
      <div class="chord-pack-tag">${item.pack} · ${item.cat}</div>
    `;
    card.addEventListener('click',()=>{
      document.querySelectorAll('.chord-card').forEach(c=>c.classList.remove('playing'));
      card.classList.add('playing');
      setTimeout(()=>card.classList.remove('playing'),600);
      playChord(item.chord,item.pack,item.idx,item.cat);
      addToSequencer(item.cat,item.pack,item.idx,label);
    });
    grid.appendChild(card);
  });
}

// ─── SEQUENCER ──────────────────────────────────────────────────────────────
let sequence=[],seqPlaying=false,seqIndex=0,seqTimer=null,bpm=90;

function updateBpm(v){ bpm=parseInt(v); document.getElementById('bpm-display').textContent=bpm; }

function addToSequencer(cat,pack,idx,label){
  sequence.push({cat,pack,idx,label}); renderSequencer();
}
function removeFromSequencer(i){ sequence.splice(i,1); renderSequencer(); }

function renderSequencer(){
  const slots=document.getElementById('seq-slots'); slots.innerHTML='';
  if(!sequence.length){ slots.innerHTML='<span class="seq-empty">← Click any chord card to add it to the sequence</span>'; return; }
  sequence.forEach((item,i)=>{
    const color=CATEGORIES[item.cat].color;
    const slot=document.createElement('div');
    const isPlaying=seqPlaying&&i===seqIndex;
    slot.className='seq-slot'+(isPlaying?' seq-playing':'');
    slot.style.borderLeftColor=color;
    slot.style.setProperty('--slot-color',color);
    slot.style.borderColor=isPlaying?color:'var(--border)';
    slot.style.color=isPlaying?color:'var(--text)';
    slot.innerHTML=`
      <span class="remove-btn" onclick="removeFromSequencer(${i})">✕</span>
      <div>
        <div class="seq-slot-name" style="color:${color}">${item.label}</div>
        <div class="seq-slot-sub">${item.pack}</div>
        <div class="seq-slot-sub" style="font-size:0.43rem;opacity:0.55">${item.cat}</div>
      </div>
    `;
    slots.appendChild(slot);
  });
}

function toggleSequencer(){ if(seqPlaying) stopSequencer(); else startSequencer(); }

function startSequencer(){
  if(!sequence.length) return;
  seqPlaying=true; seqIndex=0;
  const btn=document.getElementById('seq-play-btn');
  btn.textContent='■ STOP'; btn.className='btn stop';
  playSeqStep();
}
function stopSequencer(){
  seqPlaying=false; if(seqTimer) clearTimeout(seqTimer);
  const btn=document.getElementById('seq-play-btn');
  btn.textContent='▶ PLAY'; btn.className='btn primary';
  renderSequencer();
}
function playSeqStep(){
  if(!seqPlaying) return;
  const item=sequence[seqIndex];
  const chord=CATEGORIES[item.cat].packs[item.pack].chords[item.idx];
  playChord(chord,item.pack,item.idx,item.cat);
  renderSequencer();
  seqIndex=(seqIndex+1)%sequence.length;
  seqTimer=setTimeout(playSeqStep,(60/bpm)*1000*2);
}
function clearSequencer(){ stopSequencer(); sequence=[]; renderSequencer(); }

// ─── SHUFFLE MIX ────────────────────────────────────────────────────────────
function shuffleMix(){
  const cats=Object.keys(CATEGORIES).sort(()=>Math.random()-0.5);
  Object.keys(mixEnabled).forEach(k=>mixEnabled[k]=false);
  const count=2+Math.floor(Math.random()*2);
  cats.slice(0,count).forEach(k=>mixEnabled[k]=true);
  renderChordGrid(); renderMixBar();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function renderAll(){
  renderCatTabs(); renderPackNav(); renderMixBar(); renderChordGrid();
}
renderAll();
